services:
  sync-server:
    build:
      context: ./sync-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/data/openwhispr.db
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret}
      - API_TOKEN=${API_TOKEN:-change-me-to-a-random-token}
    volumes:
      - sync-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sync-data:
